<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Shortener App</title>
  </head>
  <body>
<form method="POST" action="/api/shorten">
    <label for="url">Enter Long URL</label><br>
    <input type="url" id="url" name="url"><br>

    <label for="alias">Enter alias</label><br>
    <input type="text" id="alias" name="alias"><br>

    <input type="submit" value="Send">
</form>
    <script src="app.js"></script>
  </body>
</html>
